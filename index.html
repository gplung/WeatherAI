<!DOCTYPE html>
<html lang="en">

<head>

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Weather Dashboard</title>

  <!-- Browser Tab Icon -->
  <link
    rel="icon"
    type="image/png"
    href="weather-app-icon.png"
  />

  <!-- iPhone Home Screen Icon -->
  <link
    rel="apple-touch-icon"
    href="weather-app-icon.png"
  />

  <!-- PWA / App Behavior -->
  <meta
    name="theme-color"
    content="#0f172a"
  />

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <meta
    name="apple-mobile-web-app-title"
    content="Weather Dashboard"
  />

  <link rel="stylesheet" href="style.css" />

</head>

</head>

<body>

  <div class="app">

    <header>

      <div class="title-bar">

        <h1>Weather Dashboard</h1>

        <button id="resetBtn">
          Reset
        </button>

      </div>

      <div class="controls">

        <input
          type="text"
          id="cityInput"
          placeholder="Add city or ZIP code"
        />

      </div>

      <div class="hint">
        Add up to 7 cities
      </div>

    </header>

    <div
      id="forecastContainer"
      class="forecast-container"
    ></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <script src="script.js"></script>

</body>

</html>
